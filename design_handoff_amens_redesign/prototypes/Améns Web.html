<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Améns — Versão Web</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --paper: #F5EFE3;
    --vellum: #FBF8F1;
    --ink: #1B1B2F;
    --ink-soft: #6B6679;
    --marian: #2E4F8B;
    --gold: #A37A2C;
    --hairline: #E6DDC8;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: #DBD4BD;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }
  .font-serif { font-family: 'Cormorant Garamond', serif; font-weight: 500; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel">
const { useState } = React;

// ─── tiny shared bits ─────────────────────────────────────────
const Orn = ({ cls = "" }) => (
  <span className={"text-[10px] " + cls} style={{ color: "var(--gold)" }}>✦</span>
);

// ─── Top nav ──────────────────────────────────────────────────
function TopBar({ active, setActive }) {
  const items = ["Hoje", "Comunidade", "Corrente", "Pedidos", "Perfil"];
  return (
    <div className="flex items-center justify-between px-12 py-5"
      style={{ borderBottom: "1px solid var(--hairline)" }}>
      <div className="flex items-center gap-3">
        <div className="font-serif italic text-[26px] leading-none" style={{ color: "var(--ink)" }}>Améns</div>
        <span className="text-[9px] uppercase tracking-[0.32em] mt-1" style={{ color: "var(--gold)" }}>Unidos pela fé</span>
      </div>
      <nav className="flex items-center gap-9">
        {items.map(it => (
          <button key={it} onClick={() => setActive(it)} className="relative text-[13px]"
            style={{ color: active === it ? "var(--ink)" : "var(--ink-soft)", fontWeight: active === it ? 600 : 400 }}>
            {it}
            {active === it && (
              <span className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full" style={{ background: "var(--gold)" }} />
            )}
          </button>
        ))}
      </nav>
      <div className="flex items-center gap-3">
        <button className="px-4 py-2 rounded-full text-[12.5px] font-medium flex items-center gap-2 whitespace-nowrap"
          style={{ background: "var(--ink)", color: "var(--paper)" }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12 5v14M5 12h14" /></svg>
          Enviar intenção
        </button>
        <button className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background: "var(--vellum)", border: "1px solid var(--hairline)" }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10 21a2 2 0 0 0 4 0" /></svg>
        </button>
        <div className="w-9 h-9 rounded-full flex items-center justify-center text-[11px] font-medium"
          style={{ background: "var(--hairline)", color: "var(--ink-soft)" }}>P</div>
      </div>
    </div>
  );
}

// ─── Hero: featured cause ─────────────────────────────────────
function HeroCause() {
  return (
    <div className="rounded-[24px] overflow-hidden grid grid-cols-[1.4fr_1fr] gap-0"
      style={{ background: "var(--vellum)", border: "1px solid var(--hairline)" }}>
      <div className="px-12 py-12">
        <div className="flex items-center gap-2 mb-6">
          <Orn />
          <span className="text-[10px] uppercase tracking-[0.32em]" style={{ color: "var(--ink-soft)" }}>Causa para interceder</span>
        </div>
        <p className="font-serif text-[40px] leading-[1.18]" style={{ color: "var(--ink)" }}>
          "Que minha mãe encontre paz após a cirurgia. Ela sempre foi nossa força em casa — peço que atravesse esse momento com confiança."
        </p>
        <div className="flex items-center gap-3 mt-9">
          <div className="w-10 h-10 rounded-full flex items-center justify-center text-[12px] font-medium"
            style={{ background: "var(--hairline)", color: "var(--ink-soft)" }}>JS</div>
          <div>
            <p className="text-[13.5px]" style={{ color: "var(--ink)" }}>Joana, 34 · São Paulo</p>
            <p className="text-[11.5px]" style={{ color: "var(--ink-soft)" }}>enviado há 2 horas</p>
          </div>
        </div>
        <div className="flex items-center gap-3 mt-9">
          <button className="px-7 py-3.5 rounded-full text-[13.5px] font-medium flex items-center gap-2"
            style={{ background: "var(--ink)", color: "var(--paper)" }}>
            Rezar com Joana
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M5 12h14M13 5l7 7-7 7" /></svg>
          </button>
          <button className="text-[12.5px] underline-offset-4 hover:underline" style={{ color: "var(--ink-soft)" }}>
            Receber outra causa
          </button>
        </div>
      </div>
      <div className="relative" style={{ background: "var(--paper)" }}>
        <div className="absolute inset-0 flex flex-col justify-between px-10 py-12">
          <div>
            <span className="text-[10px] uppercase tracking-[0.32em]" style={{ color: "var(--gold)" }}>Sugestão de oração</span>
            <p className="font-serif italic text-[19px] leading-[1.45] mt-4" style={{ color: "var(--ink)" }}>
              Senhor, conforta o coração de Joana e de sua mãe. Que tua presença atravesse as paredes do hospital e que a recuperação seja serena. Amém.
            </p>
          </div>
          <div className="grid grid-cols-2 gap-x-6 gap-y-3 pt-8" style={{ borderTop: "1px solid var(--hairline)" }}>
            <Stat label="Acompanhando agora" value="14 irmãos" />
            <Stat label="Pedidos hoje" value="2 de 3" />
          </div>
        </div>
      </div>
    </div>
  );
}

function Stat({ label, value }) {
  return (
    <div>
      <p className="text-[9.5px] uppercase tracking-[0.28em]" style={{ color: "var(--ink-soft)" }}>{label}</p>
      <p className="font-serif text-[20px] mt-1" style={{ color: "var(--ink)" }}>{value}</p>
    </div>
  );
}

// ─── Rituals stack (right column) ─────────────────────────────
function RitualsStack() {
  const items = [
    { kind: "Evangelho", title: "Mt 13, 31–35", sub: "O reino é como uma semente", meta: "3 min · leitura", badge: "hoje" },
    { kind: "Terço", title: "Mistérios gloriosos", sub: "Quinta-feira", meta: "18 min · guiado por voz" },
    { kind: "Novena", title: "N. Sra. Aparecida", sub: "Dia 4 de 9", meta: "continuar", progress: 0.44 },
    { kind: "Promessa", title: "Uma palavra para hoje", sub: "Citação bíblica diária", meta: "receber" },
  ];
  return (
    <div className="rounded-[20px] overflow-hidden" style={{ background: "var(--vellum)", border: "1px solid var(--hairline)" }}>
      <div className="px-6 pt-5 pb-3 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <Orn />
          <span className="text-[10px] uppercase tracking-[0.28em]" style={{ color: "var(--ink-soft)" }}>Rituais de hoje</span>
        </div>
      </div>
      {items.map((it, i) => (
        <button key={i} className="w-full text-left px-6 py-5 flex items-start justify-between gap-3 hover:bg-black/[0.015] transition-colors"
          style={{ borderTop: "1px solid var(--hairline)" }}>
          <div className="flex-1">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-[9px] uppercase tracking-[0.22em]" style={{ color: "var(--gold)" }}>{it.kind}</span>
              {it.badge && <span className="text-[9px] uppercase tracking-[0.16em] px-1.5 py-0.5 rounded-sm" style={{ background: "var(--ink)", color: "var(--paper)" }}>{it.badge}</span>}
            </div>
            <p className="font-serif text-[18px] leading-tight" style={{ color: "var(--ink)" }}>{it.title}</p>
            <p className="text-[11.5px] mt-1" style={{ color: "var(--ink-soft)" }}>{it.sub}</p>
            {typeof it.progress === "number" && (
              <div className="mt-3 max-w-[180px]">
                <div className="h-[3px] rounded-full" style={{ background: "var(--hairline)" }}>
                  <div className="h-[3px] rounded-full" style={{ width: `${it.progress * 100}%`, background: "var(--marian)" }} />
                </div>
              </div>
            )}
          </div>
          <div className="flex flex-col items-end gap-1 pt-1">
            <span className="text-[11px]" style={{ color: "var(--ink-soft)" }}>{it.meta}</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" style={{ color: "var(--ink)" }}><path d="M9 6l6 6-6 6" /></svg>
          </div>
        </button>
      ))}
    </div>
  );
}

// ─── Corrente ao vivo strip ───────────────────────────────────
function LivePrayer() {
  return (
    <div className="rounded-[20px] px-7 py-6 flex items-center gap-6" style={{ background: "var(--ink)", color: "var(--paper)" }}>
      <div className="relative w-12 h-12 flex items-center justify-center">
        <div className="absolute inset-0 rounded-full animate-ping" style={{ background: "#E89F4C", opacity: 0.2 }} />
        <div className="w-3 h-3 rounded-full" style={{ background: "#E89F4C" }} />
      </div>
      <div className="flex-1">
        <div className="flex items-center gap-2 mb-1">
          <span className="text-[10px] uppercase tracking-[0.32em]" style={{ color: "#E89F4C" }}>Ao vivo</span>
          <span className="text-[10px]" style={{ color: "rgba(245,239,227,0.45)" }}>· começa em 14 min</span>
        </div>
        <p className="font-serif text-[24px] leading-tight">Corrente de oração das 19h</p>
        <p className="text-[12px] mt-1" style={{ color: "rgba(245,239,227,0.65)" }}>342 irmãos confirmaram presença · 12 países</p>
      </div>
      <button className="px-6 py-3 rounded-full text-[13px] font-medium" style={{ background: "var(--paper)", color: "var(--ink)" }}>
        Entrar agora
      </button>
    </div>
  );
}

// ─── Community feed cards ─────────────────────────────────────
function FeedCard({ name, city, time, tag, text, praying, anon, gratitude }) {
  return (
    <div className="rounded-[18px] p-6 h-full flex flex-col" style={{ background: "var(--vellum)", border: "1px solid var(--hairline)" }}>
      <div className="flex items-center gap-3">
        <div className="w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-medium"
          style={{ background: "var(--hairline)", color: "var(--ink-soft)" }}>
          {anon ? (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="9" /></svg>
          ) : name.slice(0, 1)}
        </div>
        <div className="flex-1">
          <p className="text-[12.5px]" style={{ color: "var(--ink)" }}>{anon ? "Alguém preferiu anonimato" : `${name} · ${city}`}</p>
          <p className="text-[10.5px]" style={{ color: "var(--ink-soft)" }}>{time}</p>
        </div>
        <span className="text-[9px] uppercase tracking-[0.18em] px-2 py-1 rounded-sm"
          style={{ color: gratitude ? "var(--gold)" : "var(--marian)", background: gratitude ? "rgba(163,122,44,0.08)" : "rgba(46,79,139,0.06)" }}>
          {tag}
        </span>
      </div>
      <p className="font-serif text-[16px] leading-snug mt-4 flex-1" style={{ color: "var(--ink)" }}>"{text}"</p>
      <div className="flex items-center justify-between mt-5 pt-4" style={{ borderTop: "1px dashed var(--hairline)" }}>
        <p className="text-[11px]" style={{ color: "var(--ink-soft)" }}>{praying} pessoas rezaram</p>
        <button className="text-[12px] font-medium" style={{ color: "var(--marian)" }}>
          {gratitude ? "Celebrar →" : "Rezar comigo →"}
        </button>
      </div>
    </div>
  );
}

// ─── Page ─────────────────────────────────────────────────────
function HomeWeb() {
  const [active, setActive] = useState("Hoje");

  return (
    <div className="min-h-full" style={{ background: "var(--paper)" }}>
      <TopBar active={active} setActive={setActive} />

      <div className="px-12 pt-12 pb-20">
        {/* greeting */}
        <div className="flex items-end justify-between mb-9">
          <div>
            <p className="text-[12.5px]" style={{ color: "var(--ink-soft)" }}>Quinta-feira, 15 de maio · Bom dia, Pedro.</p>
            <h1 className="font-serif text-[44px] leading-[1.08] mt-2 max-w-[680px]" style={{ color: "var(--ink)" }}>
              Há uma intenção esperando por você hoje.
            </h1>
          </div>
          <div className="text-right">
            <p className="text-[10px] uppercase tracking-[0.28em]" style={{ color: "var(--ink-soft)" }}>Sua caminhada</p>
            <p className="font-serif text-[24px] mt-1" style={{ color: "var(--ink)" }}>14 dias</p>
            <div className="flex gap-[3px] mt-2 justify-end">
              {Array.from({ length: 14 }).map((_, i) => (
                <div key={i} className="w-[6px] h-[14px] rounded-sm"
                  style={{ background: i < 12 ? "var(--marian)" : "var(--hairline)", opacity: i < 12 ? (0.4 + (i / 14) * 0.6) : 1 }} />
              ))}
            </div>
          </div>
        </div>

        {/* two-column grid */}
        <div className="grid grid-cols-[1.55fr_1fr] gap-7">
          <div className="space-y-7">
            <HeroCause />
            <LivePrayer />
          </div>
          <div className="space-y-7">
            <RitualsStack />
          </div>
        </div>

        {/* divider */}
        <div className="flex items-center gap-3 my-14">
          <div className="flex-1 h-px" style={{ background: "var(--hairline)" }} />
          <span style={{ color: "var(--gold)" }}>✦</span>
          <div className="flex-1 h-px" style={{ background: "var(--hairline)" }} />
        </div>

        {/* feed */}
        <div className="flex items-end justify-between mb-6">
          <div>
            <p className="text-[10px] uppercase tracking-[0.32em]" style={{ color: "var(--gold)" }}>Da comunidade</p>
            <h2 className="font-serif text-[28px] mt-2" style={{ color: "var(--ink)" }}>Intenções recentes</h2>
          </div>
          <div className="flex items-center gap-3">
            <span className="text-[11px]" style={{ color: "var(--ink-soft)" }}>Filtrar:</span>
            {["Todas", "Saúde", "Família", "Trabalho", "Gratidão"].map((f, i) => (
              <button key={f} className="text-[12px] px-3 py-1.5 rounded-full"
                style={{
                  background: i === 0 ? "var(--ink)" : "transparent",
                  color: i === 0 ? "var(--paper)" : "var(--ink)",
                  border: "1px solid " + (i === 0 ? "var(--ink)" : "var(--hairline)"),
                }}>{f}</button>
            ))}
          </div>
        </div>

        <div className="grid grid-cols-3 gap-6">
          <FeedCard name="Marcos, 41" city="Belo Horizonte" time="há 12 min" tag="Trabalho" praying={28}
            text="Que eu encontre coragem para começar de novo depois da demissão. Tenho duas filhas em casa." />
          <FeedCard anon time="há 25 min" tag="Saúde" praying={87}
            text="Estou com medo do diagnóstico que recebo amanhã. Peço apenas que eu não esteja sozinho(a) nesse momento." />
          <FeedCard name="Lúcia, 67" city="Recife" time="há 1 h" tag="Gratidão" praying={156} gratitude
            text="Meu neto voltou para casa. Demorei um ano para pedir esta graça. Obrigada a todos que rezaram comigo." />
        </div>

        {/* small footer */}
        <div className="mt-20 pt-8 flex items-center justify-between" style={{ borderTop: "1px solid var(--hairline)" }}>
          <p className="text-[11.5px]" style={{ color: "var(--ink-soft)" }}>
            <span className="font-serif italic text-[14px]" style={{ color: "var(--ink)" }}>Améns</span> · Unidos pela fé · feito com cuidado no Brasil
          </p>
          <div className="flex gap-6 text-[11.5px]" style={{ color: "var(--ink-soft)" }}>
            <a href="#">Privacidade</a>
            <a href="#">Comunidade</a>
            <a href="#">Diretrizes</a>
            <a href="#">Suporte</a>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const W = 1280, H = 860;
  const getScale = () => Math.min(1, (window.innerWidth - 48) / W);
  const [scale, setScale] = React.useState(getScale);
  React.useEffect(() => {
    const fit = () => setScale(getScale());
    fit();
    window.addEventListener("resize", fit);
    return () => window.removeEventListener("resize", fit);
  }, []);
  return (
    <div style={{ display: "flex", justifyContent: "center", padding: 24, minHeight: H * scale + 48 }}>
      <div style={{ transform: `scale(${scale})`, transformOrigin: "top center", width: W, height: H }}>
        <ChromeWindow
          tabs={[{ title: "Améns · Unidos pela fé", active: true }, { title: "Diocese" }]}
          activeIndex={0}
          url="amens.com.br"
          width={W}
          height={H}
        >
          <div style={{ height: "100%", overflowY: "auto", background: "var(--paper)" }}>
            <HomeWeb />
          </div>
        </ChromeWindow>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
