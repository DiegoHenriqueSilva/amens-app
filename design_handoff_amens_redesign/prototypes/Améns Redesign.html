<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Améns — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --paper: #F5EFE3;
    --vellum: #FBF8F1;
    --ink: #1B1B2F;
    --ink-soft: #6B6679;
    --marian: #2E4F8B;
    --marian-soft: rgba(46,79,139,0.22);
    --gold: #A37A2C;
    --hairline: #E6DDC8;
    --app-bg: #F5EFE3;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1200px 800px at 20% 0%, #EDE5D2 0%, transparent 60%),
      radial-gradient(1000px 700px at 80% 100%, #E8E0CB 0%, transparent 55%),
      #E9E1CD;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }
  .font-serif { font-family: 'Cormorant Garamond', 'Lora', serif; font-weight: 500; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  /* hide scroll bars inside iOS frame scroll area too */
  [data-screen-scroll]::-webkit-scrollbar { display: none; }
  [data-screen-scroll] { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
